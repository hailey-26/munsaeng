
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.app { max-width: 380px; margin: 0 auto; background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: 16px; overflow: hidden; font-family: var(--font-sans); }
.topbar { padding: 1rem 1.25rem 0.5rem; display: flex; justify-content: space-between; align-items: flex-start; }
.topbar-greeting { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 2px; }
.topbar-city { font-size: 17px; font-weight: 500; color: var(--color-text-primary); display: flex; align-items: center; gap: 5px; }
.week-badge { background: #1D9E75; color: #fff; font-size: 11px; padding: 4px 10px; border-radius: 20px; font-weight: 500; white-space: nowrap; }

.mood-section { padding: 0.5rem 1.25rem 0.75rem; }
.mood-label { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 7px; }
.mood-chips { display: flex; gap: 6px; flex-wrap: wrap; }
.chip { padding: 5px 11px; border-radius: 20px; font-size: 12px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-secondary); color: var(--color-text-secondary); cursor: pointer; transition: all 0.15s; }
.chip.active { background: #1D1D1D; color: #fff; border-color: #1D1D1D; }

.top10-section { margin: 0 1.25rem 0.875rem; border: 0.5px solid var(--color-border-tertiary); border-radius: 12px; overflow: hidden; }
.top10-header { padding: 0.6rem 1rem; display: flex; align-items: center; justify-content: space-between; cursor: pointer; background: var(--color-background-secondary); }
.top10-header-left { display: flex; align-items: center; gap: 8px; }
.top10-badge { background: #E24B4A; color: #fff; font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 10px; }
.top10-title { font-size: 13px; font-weight: 500; color: var(--color-text-primary); }
.top10-chevron { font-size: 16px; color: var(--color-text-secondary); transition: transform 0.25s; }
.top10-chevron.open { transform: rotate(180deg); }
.top10-marquee { padding: 0.55rem 1rem; border-top: 0.5px solid var(--color-border-tertiary); display: flex; align-items: center; gap: 8px; }
.m-rank { font-size: 12px; font-weight: 500; color: #E24B4A; flex-shrink: 0; min-width: 22px; }
.m-content { font-size: 12px; color: var(--color-text-primary); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.m-content span { color: var(--color-text-secondary); }
.top10-list { border-top: 0.5px solid var(--color-border-tertiary); max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
.top10-list.open { max-height: 500px; }
.rank-item { display: flex; align-items: center; gap: 10px; padding: 0.5rem 1rem; border-bottom: 0.5px solid var(--color-border-tertiary); cursor: pointer; }
.rank-item:last-child { border-bottom: none; }
.rank-item:hover { background: var(--color-background-secondary); }
.rank-num { width: 20px; font-size: 12px; font-weight: 500; text-align: center; flex-shrink: 0; }
.r1 { color: #E24B4A; } .r2 { color: #BA7517; } .r3 { color: #888780; } .ro { color: var(--color-text-secondary); font-size: 11px; }
.rank-info { flex: 1; min-width: 0; }
.rank-name { font-size: 12px; font-weight: 500; color: var(--color-text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rank-place { font-size: 11px; color: var(--color-text-secondary); }
.rank-badge { font-size: 10px; padding: 2px 6px; border-radius: 6px; flex-shrink: 0; }
.bf { background: #E1F5EE; color: #085041; }
.bp { background: #F1EFE8; color: #444441; }

.section-header { padding: 0.875rem 1.25rem 0.5rem; display: flex; justify-content: space-between; align-items: center; }
.section-title { font-size: 14px; font-weight: 500; color: var(--color-text-primary); }
.section-more { font-size: 12px; color: var(--color-text-secondary); }

.pick-card { margin: 0 1.25rem 0.875rem; border-radius: 12px; overflow: hidden; position: relative; height: 170px; cursor: pointer; background: linear-gradient(135deg, #0F6E56, #1D9E75, #5DCAA5); }
.pick-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, transparent 55%); }
.pick-blob { position: absolute; top: 14px; right: 14px; width: 58px; height: 58px; border-radius: 50% 30% 60% 40%; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; }
.pick-content { position: absolute; bottom: 0; left: 0; right: 0; padding: 0.75rem; }
.pick-tags { display: flex; gap: 4px; margin-bottom: 5px; }
.ptag { font-size: 10px; padding: 2px 7px; border-radius: 8px; font-weight: 500; }
.ptag-genre { background: rgba(255,255,255,0.18); color: #fff; }
.ptag-dday { background: #E24B4A; color: #fff; }
.pick-title { font-size: 15px; font-weight: 500; color: #fff; line-height: 1.3; margin-bottom: 3px; }
.pick-sub { font-size: 11px; color: rgba(255,255,255,0.7); }

.grid-wrap { padding: 0 1.25rem 1rem; display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
.grid-card { border-radius: 10px; overflow: hidden; border: 0.5px solid var(--color-border-tertiary); cursor: pointer; background: var(--color-background-primary); }
.grid-card:hover { opacity: 0.9; }
.grid-img { width: 100%; aspect-ratio: 3/2; position: relative; display: flex; align-items: center; justify-content: center; font-size: 30px; }
.gi1 { background: #EEEDFE; }
.gi2 { background: #FAEEDA; }
.gi3 { background: #FAECE7; }
.gi4 { background: #E1F5EE; }
.gi5 { background: #E6F1FB; }
.gi6 { background: #EAF3DE; }
.gi7 { background: #FBEAF0; }
.gi8 { background: #FCEBEB; }
.g-dday { position: absolute; top: 7px; right: 7px; font-size: 9px; font-weight: 500; background: rgba(0,0,0,0.6); color: #fff; padding: 2px 6px; border-radius: 6px; }
.g-free { position: absolute; top: 7px; left: 7px; font-size: 9px; font-weight: 500; padding: 2px 6px; border-radius: 6px; }
.grid-info { padding: 7px 9px 9px; }
.g-genre { font-size: 10px; color: var(--color-text-secondary); margin-bottom: 2px; }
.g-name { font-size: 12px; font-weight: 500; color: var(--color-text-primary); line-height: 1.35; }
.g-place { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; display: flex; align-items: center; gap: 3px; }

.bottom-nav { border-top: 0.5px solid var(--color-border-tertiary); display: flex; padding: 0.75rem 0 0.5rem; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; }
.nav-item i { font-size: 20px; color: var(--color-text-secondary); }
.nav-item.active i { color: #1D9E75; }
.nav-label { font-size: 10px; color: var(--color-text-secondary); }
.nav-item.active .nav-label { color: #1D9E75; }
</style>

<h2 class="sr-only">문생 앱 메인 화면 목업 v3 — 2열 그리드</h2>

<div style="padding: 1.25rem; background: var(--color-background-secondary); border-radius: 16px;">

    <div class="pick-content">

      </div>
      <div class="pick-title">이우환의 점과 선 — 침묵의 공간</div>

      <span class="nav-label">저장</span>

</div>

<script>
const top10 = [
  {rank:1,title:'해운대 모래축제 2026',place:'해운대 해수욕장',free:true},
  {rank:2,title:'이우환 개인전 — 침묵의 공간',place:'부산시립미술관',free:true},
  {rank:3,title:'광안리 인디밴드 페스티벌',place:'광안리 야외무대',free:false},
  {rank:4,title:'감천문화마을 야시장',place:'사하구 감천동',free:true},
  {rank:5,title:'Seed Stories 사진전',place:'고은사진미술관',free:true},
  {rank:6,title:'디어 바스켓볼 : 위대한 농구선수 75인전',place:'KT&G상상마당 부산',free:false},
  {rank:7,title:'소극장 연극 — 봄날은 간다',place:'남구 소극장',free:false},
  {rank:8,title:'부산 항구 사진전 — 바다를 담다',place:'영도 갤러리',free:true},
  {rank:9,title:'친환경 리빙 페어 2026',place:'BEXCO',free:false},
  {rank:10,title:'첼로 독주회 — 한상일',place:'금정문화회관',free:true},
];
const rc = ['r1','r2','r3','ro','ro','ro','ro','ro','ro','ro'];
const listEl = document.getElementById('top10-list');
top10.forEach(it => {
  const d = document.createElement('div');
  d.className = 'rank-item';
  d.innerHTML = `<span class="rank-num ${rc[it.rank-1]}">${it.rank}</span><div class="rank-info"><div class="rank-name">${it.title}</div><div class="rank-place">${it.place}</div></div><span class="rank-badge ${it.free?'bf':'bp'}">${it.free?'무료':'유료'}</span><i class="ti ti-chevron-right" style="font-size:14px;color:var(--color-text-secondary);flex-shrink:0" aria-hidden="true"></i>`;
  listEl.appendChild(d);
});

let cur=0, isOpen=false;
function updateMarquee(i) {
  const it=top10[i];
  document.getElementById('m-rank').textContent=`${it.rank}위`;
  document.getElementById('m-content').innerHTML=`${it.title} · <span>${it.place} · ${it.free?'무료':'유료'}</span>`;
}
setInterval(()=>{ if(isOpen)return; cur=(cur+1)%top10.length; updateMarquee(cur); },2500);
function toggleList() {
  isOpen=!isOpen;
  document.getElementById('top10-list').classList.toggle('open',isOpen);
  document.getElementById('chevron').classList.toggle('open',isOpen);
}

const events = [
  {genre:'공연',name:'소극장 연극 봄날은 간다',place:'남구 소극장',dday:'D-5',free:true,cls:'gi1',icon:'ti-masks-theater',ic:'#534AB7'},
  {genre:'콘서트',name:'광안리 인디밴드 페스티벌',place:'광안리 야외무대',dday:'D-7',free:false,cls:'gi2',icon:'ti-music',ic:'#BA7517'},
  {genre:'사진전',name:'바다를 담다 : 부산 항구',place:'영도 갤러리',dday:'D-12',free:true,cls:'gi3',icon:'ti-photo',ic:'#993C1D'},
  {genre:'박람회',name:'친환경 리빙 페어 2026',place:'BEXCO',dday:'D-3',free:false,cls:'gi4',icon:'ti-building-store',ic:'#0F6E56'},
  {genre:'전시',name:'Seed Stories',place:'고은사진미술관',dday:'D-30',free:true,cls:'gi5',icon:'ti-plant',ic:'#185FA5'},
  {genre:'축제',name:'감천문화마을 야시장',place:'사하구 감천동',dday:'D-14',free:true,cls:'gi1',icon:'ti-confetti',ic:'#534AB7'},
  {genre:'공연',name:'첼로 독주회 — 한상일',place:'금정문화회관',dday:'D-1',free:true,cls:'gi6',icon:'ti-violin',ic:'#3B6D11'},
  {genre:'전시',name:'디어 바스켓볼 : 위대한 농구선수 75인전',place:'KT&G상상마당 부산',dday:'D-20',free:false,cls:'gi2',icon:'ti-ball-basketball',ic:'#BA7517'},
];

const grid = document.getElementById('grid-wrap');
events.forEach(e => {
  const d = document.createElement('div');
  d.className = 'grid-card';
  d.innerHTML = `
    <div class="grid-img ${e.cls}">
      <i class="ti ${e.icon}" style="font-size:32px;color:${e.ic}" aria-hidden="true"></i>
      <span class="g-dday">${e.dday}</span>
      <span class="g-free ${e.free?'bf':'bp'}">${e.free?'무료':'유료'}</span>
    </div>
    <div class="grid-info">
      <div class="g-genre">${e.genre}</div>
      <div class="g-name">${e.name}</div>
      <div class="g-place"><i class="ti ti-map-pin" style="font-size:11px" aria-hidden="true"></i>${e.place}</div>
    </div>`;
  grid.appendChild(d);
});
</script>
