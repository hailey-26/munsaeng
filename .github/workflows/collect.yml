name: Collect Busan Culture Events

on:
  schedule:
    - cron: '0 17 * * *'  # 매일 새벽 2시 KST (UTC 17:00)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Run collector
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BUSAN_API_KEY: ${{ secrets.BUSAN_API_KEY }}
        run: npx ts-node --project tsconfig.scripts.json scripts/collectors/busan-culture.ts
